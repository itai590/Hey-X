# nginx access.log retention for the shared `nginx-logs` volume.
# Applied by the `log-rotate` sidecar in docker-compose.yml (hourly logrotate run).
# copytruncate: rotate without signaling nginx; the backend log-watcher tails by name.
/var/log/nginx/access.log {
    daily
    rotate 14
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
    dateext
}
