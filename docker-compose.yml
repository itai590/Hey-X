# Shared container stdout/stderr retention (Docker json-file driver). Bounds disk used by
# `docker logs` for every service: max 5 files * 10m = ~50m per container.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  backend:
    container_name: hey-${DOG_SLUG}-backend
    image: hey-${DOG_SLUG}-backend
    logging: *default-logging
    build:
      context: backend
      dockerfile: Dockerfile
    restart: always
    volumes:
      - ./backend/data:/app/backend/data # db + runtime config — single mount for persisted backend state
      - nginx-logs:/var/log/nginx:ro
      - /var/log/hey:/var/log/hey
    tmpfs:
      - /tmp:size=50m
    devices:
      - /dev/snd:/dev/snd
    ports:
      - "5100:5100"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:5100/api/config',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 3s
      timeout: 5s
      retries: 5
      start_period: 180s
    environment:
      - TZ=${TZ:-UTC}
      - DOG_SLUG=${DOG_SLUG}
      - PUBLIC_URL=${PUBLIC_URL-/}
      - PRIMARY_DOMAIN=${PRIMARY_DOMAIN}
      - HEY_CONFIG_PATH=/app/backend/data/config.json
      - HEY_ADMIN_TOKEN=${HEY_ADMIN_TOKEN}
      - HEY_REQUIRE_HTTPS=${HEY_REQUIRE_HTTPS:-true}
      - HEY_REQUIRE_HTTPS_TRUST_LAN=${HEY_REQUIRE_HTTPS_TRUST_LAN:-false}
      - HEY_DOCS_ADMIN_TRUST_LAN=${HEY_DOCS_ADMIN_TRUST_LAN:-false}
      - NGINX_LOG_PATH=/var/log/nginx/access.log
      - ALERT_COOLDOWN_MINUTES=${ALERT_COOLDOWN_MINUTES:-30} # per-IP cooldown between HTTP 200 alerts
      - ALERT_MAX_EMAILS_PER_HOUR=${ALERT_MAX_EMAILS_PER_HOUR:-20} # global cap; 0 = unlimited
      - ALERT_DIGEST_HOURS=${ALERT_DIGEST_HOURS:-24} # suppressed-activity digest cadence in hours (default daily)
      - ALERT_LOG_HTTP_STATUS=${ALERT_LOG_HTTP_STATUS:-} # e.g. 403,444 — bare status matches (always digest-only; codes are 4xx/5xx)
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - ALERT_EMAIL_FROM=${ALERT_EMAIL_FROM}
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO}
      - HEY_LOG_DIR=/var/log/hey # append logs to persists /var/log/hey/backend.log
      - HEY_LOG_MAX_BYTES=${HEY_LOG_MAX_BYTES:-10485760} # rotate backend.log past this size (10 MiB)
      - HEY_LOG_KEEP_FILES=${HEY_LOG_KEEP_FILES:-5} # number of rotated backend.log.N files to keep
      - HEY_UNLINK_MIC_CLIP_AFTER_PROCESS=true # default true: delete clip-*.wav after processing; false: keeps files (watch disk)
      - HEY_CLIP_TMP_DIR=/app/backend/data/mic_temp

  health-watch:
    container_name: hey-${DOG_SLUG}-health-watch
    image: hey-${DOG_SLUG}-backend
    logging: *default-logging
    restart: always
    command: ["npm", "run", "health-watch"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=${TZ:-UTC}
      - DOG_SLUG=${DOG_SLUG}
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - ALERT_EMAIL_FROM=${ALERT_EMAIL_FROM}
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO}
      - HEALTH_WATCH_INTERVAL_SEC=${HEALTH_WATCH_INTERVAL_SEC:-60}
      - HEALTH_ALERT_COOLDOWN_MINUTES=${HEALTH_ALERT_COOLDOWN_MINUTES:-30}
      - HEALTH_WATCH_EMAIL_ON_RECOVERY=${HEALTH_WATCH_EMAIL_ON_RECOVERY:-false}
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started

  frontend:
    depends_on:
      backend:
        condition: service_healthy
    container_name: hey-${DOG_SLUG}-frontend
    image: hey-${DOG_SLUG}-frontend
    logging: *default-logging
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        PUBLIC_URL: ${PUBLIC_URL:-/}
        TZ: ${TZ:-UTC}
        PRIMARY_DOMAIN: ${PRIMARY_DOMAIN}
    restart: always
    ports:
      - "8443:443"
      # "8080:80" temporarily add for first time HTTP-only nginx (before certs exist)
    environment:
      - TZ=${TZ}
      - DOG_SLUG=${DOG_SLUG}
      - PUBLIC_URL=${PUBLIC_URL:-/}
      - PRIMARY_DOMAIN=${PRIMARY_DOMAIN}
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/lib/letsencrypt:/var/lib/letsencrypt
      - nginx-logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 60s

  certbot:
    image: certbot/certbot
    container_name: hey-${DOG_SLUG}-certbot
    logging: *default-logging
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/lib/letsencrypt:/var/lib/letsencrypt
    entrypoint:
      "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h &
      wait $${!}; done;'"

  # Rotates the nginx access.log file on the shared volume. Uses copytruncate so nginx
  # keeps writing to the same fd (no cross-container signal needed) and the backend
  # log-watcher's `tail --follow=name --retry` keeps following across rotations.
  log-rotate:
    image: alpine:3.20
    container_name: hey-${DOG_SLUG}-log-rotate
    logging: *default-logging
    restart: always
    volumes:
      - nginx-logs:/var/log/nginx
      - ./ops/logrotate-nginx.conf:/etc/logrotate.d/nginx:ro
    command:
      - /bin/sh
      - -c
      - "apk add --no-cache logrotate >/dev/null 2>&1 && while :; do logrotate -s /var/log/nginx/.logrotate.status /etc/logrotate.d/nginx; sleep 3600; done"

volumes:
  nginx-logs:
