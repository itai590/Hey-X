load_module /usr/lib/nginx/modules/ngx_http_perl_module.so;

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
error_log  stderr notice;
pid        /var/run/nginx.pid;

events {
    # Docker default nofile is often 1024; higher values log a warning and cannot be used fully.
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    # Numeric dd/mm/yyyy + time + numeric TZ offset (respects container TZ).
    # Note: error_log lines keep nginx's built-in YYYY/MM/DD prefix; only access_log uses this format.
    perl_set $access_ts 'sub {
        use POSIX qw(strftime);
        return strftime("%d/%m/%Y %H:%M:%S %z", localtime(time));
    }';

    log_format  ddmmyyyy  '$remote_addr - $remote_user [$access_ts] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent" "$http_x_forwarded_for"';

    # File: shared volume (backend log-watcher, docker exec tail). Stdout: docker compose logs frontend.
    access_log  /var/log/nginx/access.log  ddmmyyyy;
    access_log  /dev/stdout               ddmmyyyy;

    sendfile        on;
    tcp_nopush      on;

    keepalive_timeout  65;

    include /etc/nginx/conf.d/*.conf;
}
