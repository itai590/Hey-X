# HTTP-only config: used when Let's Encrypt certs are not yet available
server {
    listen 80;
    # Catch-all — set PRIMARY_DOMAIN + certs at runtime for HTTPS / named vhosts
    server_name _;

    include /etc/nginx/snippets/health-location.conf;

    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/snippets/security-headers.conf;

    gzip on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        font/woff
        font/woff2;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_proxied any;

    include /etc/nginx/snippets/app-dynamic.conf;
}
