openapi: 3.0.3
info:
  # Overwritten at startup by server.js (`siteApiTitle()`); static default matches empty DOG_NAME.
  title: Hey API
  description: |
    Backend for bark detection, SQLite messages, and WAV training workflows.

    **Admin routes** use `Authorization: Bearer` with a secret from env (optional split):
    - Default: `HEY_ADMIN_TOKEN` (+ optional `HEY_ADMIN_TOKEN_PREVIOUS` during rotation).
    - **Training** (`/api/training/*`, `POST /api/custom-head/train`): `HEY_TRAINING_ADMIN_TOKEN` when set, else same as main.
    - **Docs** (this YAML, `/api/docs`, `PUT /api/custom-head/clip`): `HEY_DOCS_ADMIN_TOKEN` when set, else same as main.

    With `HEY_REQUIRE_HTTPS=true`, non-HTTPS requests are rejected (`403`) unless exempted: localhost when `HEY_REQUIRE_HTTPS_TRUST_LOOPBACK=true`, or private IPv4 (RFC 1918 / 169.254.0.0/16) peers on the TCP connection when `HEY_REQUIRE_HTTPS_TRUST_LAN=true` (uses socket address, not forwarded headers).
    Failed `verify-admin` attempts are rate-limited and may return `429` with `Retry-After`.
  version: 1.0.0

servers:
  - url: /
    description: Backend origin (default port 5100)

tags:
  - name: Auth
  - name: Messages
  - name: Config
  - name: CustomHead
  - name: Training
  - name: Presence

components:
  securitySchemes:
    bearerMainAuth:
      type: http
      scheme: bearer
      description: HEY_ADMIN_TOKEN (SPA — messages, config, admin logs)
    bearerTrainingAuth:
      type: http
      scheme: bearer
      description: HEY_TRAINING_ADMIN_TOKEN or HEY_ADMIN_TOKEN if training token unset
    bearerDocsAuth:
      type: http
      scheme: bearer
      description: HEY_DOCS_ADMIN_TOKEN or HEY_ADMIN_TOKEN if docs token unset (Swagger + clip upload)

paths:
  /api/auth/verify-admin:
    post:
      tags: [ Auth ]
      summary: Verify admin password or Bearer token
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                password:
                  type: string
                  description: Secret for the chosen audience (alternative to Bearer header on this request)
                audience:
                  type: string
                  enum: [main, training, docs]
                  default: main
                  description: Which env secret to check (main SPA / training WAV API / docs+clip upload)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  audience:
                    type: string
                    enum: [ main, training, docs ]
                    description: Confirms which credential was verified
                  authDisabled:
                    type: boolean
                    description: Present when no secret applies for that audience
        "401":
          description: Invalid credentials
        "403":
          description: HTTPS required (`HEY_REQUIRE_HTTPS`); body may include code `HTTPS_REQUIRED`
        "429":
          description: Too many verify-admin attempts or temporary lockout; may include codes `VERIFY_ADMIN_RATE_LIMITED` or `VERIFY_ADMIN_LOCKED`

  /api/messages:
    get:
      tags: [ Messages ]
      summary: List timeline messages
      responses:
        "200":
          description: Messages newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
    delete:
      tags: [ Messages ]
      summary: Delete messages by ids
      security:
        - bearerMainAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ ids ]
              properties:
                ids:
                  type: array
                  items: { type: string }
      responses:
        "200":
          description: Deleted count
        "400":
          description: Validation error
        "401":
          description: Unauthorized

  /api/messages/{id}:
    put:
      tags: [ Messages ]
      summary: Create or update a message
      security:
        - bearerMainAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text: { type: string }
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized

  /api/config:
    get:
      tags: [ Config ]
      summary: Get merged runtime configuration
      responses:
        "200":
          description: Config object
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    put:
      tags: [ Config ]
      summary: Update allowed config keys
      security:
        - bearerMainAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: Only known keys accepted (e.g. DOG_NAME, MIC_MUTED,
                DETECTION_THRESHOLD)
      responses:
        "200":
          description: Updated config
        "400":
          description: Unknown or invalid keys
        "401":
          description: Unauthorized

  /api/custom-head/status:
    get:
      tags: [ CustomHead ]
      summary: Custom head + clip counts
      responses:
        "200":
          description: Status object

  /api/custom-head/train:
    post:
      tags: [ CustomHead ]
      summary: Run Python train_custom_head.py
      security:
        - bearerTrainingAuth: []
      responses:
        "200":
          description: Training finished
        "401":
          description: Unauthorized
        "500":
          description: Training failed

  /api/custom-head/clip/{label}:
    put:
      tags: [ CustomHead ]
      summary: Upload a WAV clip into custom_clips/{label}
      security:
        - bearerDocsAuth: []
      parameters:
        - name: label
          in: path
          required: true
          schema:
            type: string
            enum: [ bark, not_bark ]
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Saved
        "401":
          description: Unauthorized
        "413":
          description: Body too large

  /api/training/listen:
    get:
      tags: [ Training ]
      summary: HTML page to review WAVs (browser UI)
      responses:
        "200":
          description: HTML
          content:
            text/html:
              schema:
                type: string

  /api/training/audio-catalog:
    get:
      tags: [ Training ]
      summary: JSON listing of inbox, mic_temp, and custom clip WAVs
      security:
        - bearerTrainingAuth: []
      responses:
        "200":
          description: Catalog
        "401":
          description: Unauthorized

  /api/training/mic-temp/{filename}/audio:
    get:
      tags: [ Training ]
      summary: Stream a mic temp WAV (e.g. clip-1777557607959.wav)
      security:
        - bearerTrainingAuth: []
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
            example: clip-1777557607959.wav
      responses:
        "200":
          description: audio/wav
          content:
            audio/wav:
              schema:
                type: string
                format: binary
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /api/training/custom-clips/{label}/{filename}/audio:
    get:
      tags: [ Training ]
      summary: Stream a WAV from data/custom_clips/{label}
      security:
        - bearerTrainingAuth: []
      parameters:
        - name: label
          in: path
          required: true
          schema:
            type: string
            enum: [ bark, not_bark ]
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: audio/wav
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /api/training/inbox:
    get:
      tags: [ Training ]
      summary: List training inbox clips with metadata
      security:
        - bearerTrainingAuth: []
      responses:
        "200":
          description: Inbox list
        "401":
          description: Unauthorized
    delete:
      tags: [ Training ]
      summary: Remove all WAV and JSON files from the training inbox directory
      description: Does not delete clips already under custom_clips.
      security:
        - bearerTrainingAuth: []
      responses:
        "200":
          description: Cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  removedFiles:
                    type: integer
        "401":
          description: Unauthorized
        "500":
          description: Server error

  /api/training/inbox/{clipId}/audio:
    get:
      tags: [ Training ]
      summary: Stream training inbox WAV by UUID
      security:
        - bearerTrainingAuth: []
      parameters:
        - name: clipId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: audio/wav
        "400":
          description: Invalid clip id
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /api/training/inbox/{clipId}/promote:
    post:
      tags: [ Training ]
      summary: Move clip from inbox to custom_clips for labeling
      security:
        - bearerTrainingAuth: []
      parameters:
        - name: clipId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ label ]
              properties:
                label:
                  type: string
                  enum: [ bark, not_bark ]
      responses:
        "200":
          description: Promoted
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "404":
          description: Clip not found

  /api/training/inbox/{clipId}:
    delete:
      tags: [ Training ]
      summary: Remove clip from training inbox
      security:
        - bearerTrainingAuth: []
      parameters:
        - name: clipId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deleted
        "400":
          description: Invalid clip id
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /api/presence:
    get:
      tags: [ Presence ]
      summary: Heartbeat, last sound, RMS floor, last classification snapshot
      responses:
        "200":
          description: Presence payload
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
